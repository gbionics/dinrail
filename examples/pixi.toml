[workspace]
name = "dinrail-examples"
version = "0.0.0"
description = "Standalone examples that consume dinrail as an external dependency"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "win-64", "osx-arm64"]
preview = ["pixi-build"]

[target.win.activation.env]
CMAKE_INSTALL_PREFIX = "%CONDA_PREFIX%\\Library"

[target.unix.activation.env]
CMAKE_INSTALL_PREFIX = "$CONDA_PREFIX"

[tasks]
configure = { cmd = [
    "cmake",
    "-DCMAKE_BUILD_TYPE=Release",
    "-DCMAKE_INSTALL_PREFIX=$CMAKE_INSTALL_PREFIX",
    "-G",
    "Ninja",
    "-S",
    ".",
    "-B",
    ".build",
] }

build = { cmd = "cmake --build .build --config Release", depends-on = ["configure"] }
install = { cmd = ["cmake", "--install", ".build", "--config", "Release"], depends-on = ["build"] }
run-implement-your-first-device = { cmd = "implement-your-first-device", depends-on = ["install"] }

[dependencies]
cmake = "*"
cxx-compiler = "*"
ninja = "*"
pkg-config = "*"

dinrail = { path = ".." }
